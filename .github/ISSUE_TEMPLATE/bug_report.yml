name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the
        sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the project is affected?
      options:
        - Keycloak Configuration
        - Keycloak SPI Providers
        - Keycloak Themes
        - Infrastructure (Terraform)
        - Infrastructure (Kubernetes/Helm)
        - Example - Spring Boot
        - Example - Quarkus
        - Example - ASP.NET Core
        - Example - Express
        - Example - NestJS
        - Example - FastAPI
        - Example - React
        - Example - Vue
        - Example - Next.js
        - Example - Angular
        - CI/CD Workflows
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details.
      placeholder: |
        - OS: Ubuntu 22.04
        - Keycloak version: 26.4.2
        - Kubernetes version: 1.30
        - Browser: Chrome 120
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste any relevant log output or attach screenshots.
      render: shell
    validations:
      required: false
