###############################################################################
# terraform-apply.yml
# Applies Terraform changes on merge to main.
#
# Runs terraform plan and apply for the selected environment.
# Production deployments require manual approval via GitHub environment
# protection rules.
###############################################################################

name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
        default: dev
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

concurrency:
  group: terraform-apply-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.9.5"
  WORKING_DIR: infra/terraform

jobs:
  # -------------------------------------------------------------------------
  # Plan -- generate execution plan for each environment
  # -------------------------------------------------------------------------
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.environment)) || fromJSON('["dev"]') }}
      fail-fast: false
    environment: ${{ matrix.environment }}
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="environments/${{ matrix.environment }}/backend.tfvars"

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="environments/${{ matrix.environment }}/terraform.tfvars" \
            -out=tfplan-${{ matrix.environment }} \
            -detailed-exitcode \
            -no-color
        continue-on-error: true

      - name: Upload plan artifact
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ${{ env.WORKING_DIR }}/tfplan-${{ matrix.environment }}
          retention-days: 5

  # -------------------------------------------------------------------------
  # Apply -- execute the plan (manual approval for prod)
  # -------------------------------------------------------------------------
  apply:
    name: Apply (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: plan
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') ||
      (github.event_name == 'push')
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', github.event.inputs.environment)) || fromJSON('["dev"]') }}
      fail-fast: false
    environment:
      name: ${{ matrix.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="environments/${{ matrix.environment }}/backend.tfvars"

      - name: Terraform apply
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ -f "tfplan-${{ matrix.environment }}" ]; then
            terraform apply -auto-approve "tfplan-${{ matrix.environment }}"
          else
            terraform apply \
              -var-file="environments/${{ matrix.environment }}/terraform.tfvars" \
              -auto-approve
          fi
