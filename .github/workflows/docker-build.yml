###############################################################################
# docker-build.yml
# Build and push Keycloak Docker image to Google Container Registry.
#
# Triggers on pushes to main/dev that modify Keycloak or Docker files,
# and on manual dispatch for ad-hoc builds.
###############################################################################

name: Docker Build and Push

on:
  push:
    branches: [main, dev]
    paths:
      - "keycloak/**"
      - "infra/docker/Dockerfile.keycloak"
      - ".github/workflows/docker-build.yml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Custom image tag (default: git SHA)"
        required: false
        type: string

concurrency:
  group: docker-build-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

env:
  REGISTRY: gcr.io
  IMAGE_NAME: ${{ secrets.GCR_PROJECT_ID }}/iam-keycloak
  KC_VERSION: "26.4.2"

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event.inputs.image_tag != '' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=X-IAM Keycloak
            org.opencontainers.image.description=Enterprise IAM platform based on Keycloak ${{ env.KC_VERSION }}
            org.opencontainers.image.vendor=Ximplicity Software Solutions S.L.

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.keycloak
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            KC_DB=postgres
            KC_HEALTH_ENABLED=true
            KC_METRICS_ENABLED=true

      - name: Print image details
        run: |
          echo "Image tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Image digest: ${{ steps.build.outputs.digest }}"

  # -------------------------------------------------------------------------
  # Build tools image
  # -------------------------------------------------------------------------
  build-tools:
    name: Build Tools Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push tools image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.tools
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.GCR_PROJECT_ID }}/iam-tools:latest
            ${{ env.REGISTRY }}/${{ secrets.GCR_PROJECT_ID }}/iam-tools:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
