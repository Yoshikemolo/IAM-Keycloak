# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM Spring Boot Example.
#
# Services:
#   app - The Spring Boot backend application, connecting to the platform
#         Keycloak instance running on the devops_iam-network.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- Spring Boot Application ----------
  app:
    build: .
    container_name: iam-spring-boot-app
    ports:
      - "8081:8081"
    environment:
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: http://iam-keycloak:8080/realms/tenant
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID: spring-boot-app
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: change-me
      KEYCLOAK_URL: http://iam-keycloak:8080
    networks:
      - iam-network

networks:
  iam-network:
    external: true
    name: devops_iam-network
