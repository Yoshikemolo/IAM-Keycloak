<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="#{unauthorized.title} + ' - ' + #{app.title}">Access Denied</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}" />
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
  <div class="app-layout">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="app-main">
      <div class="page">
        <h1 class="page-title" th:text="#{unauthorized.title}">Access Denied</h1>
        <p class="page-description" th:text="#{unauthorized.message}">
          You do not have permission to view this page.
        </p>

        <a th:href="@{/}" class="btn btn-primary" th:text="#{unauthorized.backHome}">Back to Home</a>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
</body>
</html>
