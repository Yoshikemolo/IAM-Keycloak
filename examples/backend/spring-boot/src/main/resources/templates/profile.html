<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="#{profile.title} + ' - ' + #{app.title}">Profile</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}" />
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
  <div class="app-layout">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="app-main">
      <div class="page">
        <h1 class="page-title" th:text="#{profile.title}">Profile</h1>
        <p class="page-description" th:text="#{profile.description}">
          Full set of claims from your OIDC identity token.
        </p>

        <!-- Basic info card -->
        <div class="card" style="margin-bottom: var(--spacing-lg);">
          <dl class="info-list">
            <dt th:text="#{profile.name}">Full Name</dt>
            <dd th:text="${userName}">-</dd>

            <dt th:text="#{profile.email}">Email</dt>
            <dd th:text="${userEmail != null ? userEmail : '-'}">-</dd>

            <dt th:text="#{profile.roles}">Assigned Roles</dt>
            <dd>
              <div class="badge-group" th:if="${!roles.isEmpty()}">
                <span th:each="role : ${roles}"
                      class="badge"
                      th:classappend="${role == 'admin'} ? 'badge-admin' : 'badge-user'"
                      th:text="${role}">role</span>
              </div>
              <span th:if="${roles.isEmpty()}" class="text-muted">-</span>
            </dd>
          </dl>
        </div>

        <!-- Token Claims card -->
        <div class="card">
          <h2 class="card-title" th:text="#{profile.claimsTitle}">Token Claims</h2>
          <div class="info-list-vertical">
            <div th:each="entry : ${claims}" class="info-list-item">
              <div class="info-label" th:text="${entry.key}">claim</div>
              <div class="info-value" th:text="${entry.value}">value</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
</body>
</html>
