<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="#{admin.title} + ' - ' + #{app.title}">Administration</title>
  <link rel="stylesheet" th:href="@{/css/variables.css}" />
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  <script th:src="@{/js/theme.js}"></script>
</head>
<body>
  <div class="app-layout">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="app-main">
      <div class="page">
        <h1 class="page-title" th:text="#{admin.title}">Administration</h1>
        <p class="page-description" th:text="#{admin.welcome(${userName})}">
          Welcome. You have administrative access.
        </p>

        <div class="card">
          <h2 class="card-title" th:text="#{admin.panelTitle}">Admin Panel</h2>
          <p class="page-description" th:text="#{admin.panelDescription}">
            This section is only visible to users with the admin role.
          </p>

          <ul class="admin-actions">
            <li th:text="#{admin.actionUsers}">Manage users</li>
            <li th:text="#{admin.actionRoles}">Manage roles</li>
            <li th:text="#{admin.actionSettings}">System settings</li>
          </ul>
        </div>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </div>
</body>
</html>
