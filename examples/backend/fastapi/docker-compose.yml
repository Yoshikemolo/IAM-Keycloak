# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM FastAPI Example.
#
# Services:
#   app - The FastAPI application served by Uvicorn, connecting to the
#         platform Keycloak instance running on the devops_iam-network.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- FastAPI Application ----------
  app:
    build: .
    container_name: iam-fastapi-app
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      OIDC_ISSUER: http://iam-keycloak:8080/realms/iam-example
    networks:
      - iam-network

networks:
  iam-network:
    external: true
    name: devops_iam-network
