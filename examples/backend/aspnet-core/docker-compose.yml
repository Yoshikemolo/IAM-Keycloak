# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM ASP.NET Core Example.
#
# Services:
#   app - The ASP.NET Core backend application, connecting to the platform
#         Keycloak instance running on the devops_iam-network.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- ASP.NET Core Application ----------
  app:
    build:
      context: ../../..
      dockerfile: examples/backend/aspnet-core/Dockerfile
    container_name: iam-aspnet-core-app
    ports:
      - "5000:5000"
    environment:
      Keycloak__Authority: http://iam-keycloak:8080/realms/tenant
      Keycloak__ClientId: aspnet-core-app
      Keycloak__ClientSecret: change-me
      Keycloak__PublicAuthority: http://localhost:8080/realms/tenant
    networks:
      - iam-network

networks:
  iam-network:
    external: true
    name: devops_iam-network
