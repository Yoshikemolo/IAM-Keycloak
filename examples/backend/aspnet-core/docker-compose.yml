# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM ASP.NET Core Example.
#
# Services:
#   keycloak - Keycloak identity provider running in development mode with
#              realm auto-import enabled.
#   app      - The ASP.NET Core backend application, depending on a healthy
#              Keycloak instance before starting.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- Keycloak Identity Provider ----------
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: iam-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------- ASP.NET Core Application ----------
  app:
    build:
      context: ../../..
      dockerfile: examples/backend/aspnet-core/Dockerfile
    container_name: iam-aspnet-core-app
    ports:
      - "5000:5000"
    environment:
      Keycloak__Authority: http://keycloak:8080/realms/tenant
      Keycloak__ClientId: aspnet-core-app
      Keycloak__ClientSecret: change-me
      Keycloak__PublicAuthority: http://localhost:8080/realms/tenant
    depends_on:
      keycloak:
        condition: service_healthy
