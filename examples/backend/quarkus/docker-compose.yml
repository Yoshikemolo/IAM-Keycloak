# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM Quarkus Example.
#
# Services:
#   app - The Quarkus backend application, connecting to the platform
#         Keycloak instance running on the devops_iam-network.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- Quarkus Application ----------
  app:
    build: .
    container_name: iam-quarkus-app
    ports:
      - "8082:8082"
    environment:
      QUARKUS_OIDC_AUTH_SERVER_URL: http://iam-keycloak:8080/realms/iam-example
      QUARKUS_OIDC_CLIENT_ID: quarkus-app
      QUARKUS_OIDC_CREDENTIALS_SECRET: change-me
      QUARKUS_HTTP_PORT: 8082
    networks:
      - iam-network

networks:
  iam-network:
    external: true
    name: devops_iam-network
