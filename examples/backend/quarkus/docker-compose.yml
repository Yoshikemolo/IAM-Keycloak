# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM Quarkus Example.
#
# Services:
#   keycloak - Keycloak identity provider running in development mode with
#              realm auto-import enabled.
#   app      - The Quarkus backend application, depending on a healthy
#              Keycloak instance before starting.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- Keycloak Identity Provider ----------
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: iam-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------- Quarkus Application ----------
  app:
    build: .
    container_name: iam-quarkus-app
    ports:
      - "8082:8082"
    environment:
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/tenant
      QUARKUS_OIDC_CLIENT_ID: quarkus-app
      QUARKUS_OIDC_CREDENTIALS_SECRET: change-me
      QUARKUS_HTTP_PORT: 8082
    depends_on:
      keycloak:
        condition: service_healthy
