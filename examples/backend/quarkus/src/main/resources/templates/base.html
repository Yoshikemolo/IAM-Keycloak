<!DOCTYPE html>
<!--
  Base Qute layout template for the IAM Quarkus Example.
  All pages extend this template via {#include base}.
-->
<html lang="{lang ?: 'en'}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{#insert title}{messages.get('app.title') ?: 'IAM Quarkus Example'}{/insert}</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div class="app-layout">
    {#include tags/header}{/include}

    <main class="app-main">
      {#insert content}No content provided.{/insert}
    </main>

    {#include tags/footer}{/include}
  </div>
</body>
</html>
