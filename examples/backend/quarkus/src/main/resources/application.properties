# ==========================================================================
# Quarkus OIDC Configuration for Keycloak
# ==========================================================================

# Application name
quarkus.application.name=iam-quarkus-example

# HTTP port (8082 to avoid conflict with Keycloak on 8080)
quarkus.http.port=8082

# ---------- OIDC / Keycloak ----------

# Authorization server URL (Keycloak realm endpoint)
quarkus.oidc.auth-server-url=http://localhost:8080/realms/iam-example

# Client credentials
quarkus.oidc.client-id=quarkus-app
quarkus.oidc.credentials.secret=change-me

# Use web-app (Authorization Code flow) instead of service (Bearer-only)
quarkus.oidc.application-type=web-app

# Role source: extract roles from realm_access in the access token
quarkus.oidc.roles.source=accesstoken
quarkus.oidc.roles.role-claim-path=realm_access/roles
quarkus.oidc.token.principal-claim=preferred_username

# Redirect to /unauthorized on 403 Forbidden
quarkus.oidc.authentication.redirect-path=/dashboard
quarkus.oidc.logout.path=/logout
quarkus.oidc.logout.post-logout-path=/

# Allow unauthenticated access to public pages
quarkus.http.auth.permission.public.paths=/,/unauthorized,/css/*,/js/*,/fonts/*,/favicon.ico
quarkus.http.auth.permission.public.policy=permit

# Authenticated pages
quarkus.http.auth.permission.authenticated.paths=/dashboard,/profile
quarkus.http.auth.permission.authenticated.policy=authenticated

# Admin-only pages
quarkus.http.auth.permission.admin.paths=/admin
quarkus.http.auth.permission.admin.policy=admin-policy
quarkus.http.auth.policy.admin-policy.roles-allowed=admin

# Redirect to /unauthorized when access is denied (403)
quarkus.http.auth.permission.admin.methods=GET
quarkus.oidc.authentication.session-age-extension=30M

# ---------- Qute ----------

# Template suffix
quarkus.qute.suffixes=html

# ---------- Logging ----------

quarkus.log.category."com.ximplicity".level=DEBUG
