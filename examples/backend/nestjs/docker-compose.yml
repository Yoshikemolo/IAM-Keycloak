# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM NestJS Example.
#
# Services:
#   keycloak - Keycloak identity provider running in development mode with
#              realm auto-import enabled.
#   app      - The NestJS server, depending on a healthy Keycloak
#              instance before starting.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- Keycloak Identity Provider ----------
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: iam-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------- NestJS Application ----------
  app:
    build:
      context: ../../../
      dockerfile: examples/backend/nestjs/Dockerfile
    container_name: iam-nestjs-app
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      APP_URL: http://localhost:3001
    depends_on:
      keycloak:
        condition: service_healthy
