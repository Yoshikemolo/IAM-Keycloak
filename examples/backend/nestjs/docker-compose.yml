# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM NestJS Example.
#
# Services:
#   app - The NestJS server, connecting to the platform Keycloak instance
#         running on the devops_iam-network.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- NestJS Application ----------
  app:
    build:
      context: ../../../
      dockerfile: examples/backend/nestjs/Dockerfile
    container_name: iam-nestjs-app
    ports:
      - "3001:3001"
    env_file:
      - .env.example
    environment:
      KEYCLOAK_URL: http://iam-keycloak:8080
      APP_URL: http://localhost:3001
    networks:
      - iam-network

networks:
  iam-network:
    external: true
    name: devops_iam-network
