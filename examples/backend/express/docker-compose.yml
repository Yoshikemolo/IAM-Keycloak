# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM Express.js Example.
#
# Services:
#   app - The Express.js server, connecting to the platform Keycloak instance
#         running on the devops_iam-network.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- Express.js Application ----------
  app:
    build:
      context: ../../../
      dockerfile: examples/backend/express/Dockerfile
    container_name: iam-express-app
    ports:
      - "3002:3000"
    env_file:
      - .env.example
    environment:
      KEYCLOAK_URL: http://iam-keycloak:8080
      KEYCLOAK_URL_PUBLIC: http://localhost:8080
      APP_URL: http://localhost:3002
    networks:
      - iam-network

networks:
  iam-network:
    external: true
    name: devops_iam-network
