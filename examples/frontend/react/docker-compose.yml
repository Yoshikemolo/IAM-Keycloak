# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM React Example.
#
# Services:
#   app - The React SPA served by Nginx, connecting to the platform
#         Keycloak instance running on the devops_iam-network.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- React SPA ----------
  app:
    build: .
    container_name: iam-react-app
    ports:
      - "5173:80"
    env_file:
      - .env.example
    networks:
      - iam-network

networks:
  iam-network:
    external: true
    name: devops_iam-network
