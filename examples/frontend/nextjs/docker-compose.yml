# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM Next.js Example.
#
# Services:
#   app - The Next.js standalone Node.js server, connecting to the platform
#         Keycloak instance running on the devops_iam-network.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- Next.js App ----------
  app:
    build: .
    container_name: iam-nextjs-app
    ports:
      - "3001:3000"
    env_file:
      - .env.example
    environment:
      KEYCLOAK_ISSUER: http://iam-keycloak:8080/realms/iam-example
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - iam-network

networks:
  iam-network:
    external: true
    name: devops_iam-network
