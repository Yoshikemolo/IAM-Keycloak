# ---------------------------------------------------------------------------
# Nginx configuration for the IAM Angular Example SPA.
#
# Key features:
#   - SPA fallback: all unknown routes are rewritten to index.html so that
#     the Angular Router can handle client-side routing.
#   - Gzip compression for text-based assets.
#   - Security headers to mitigate common web vulnerabilities.
#   - Long-lived cache for hashed static assets produced by Angular CLI.
# ---------------------------------------------------------------------------

server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "1; mode=block"    always;

    # ------------------------------------------------------------------
    # Static assets with content-hash filenames (produced by Angular CLI).
    # Cache aggressively since the hash changes on every rebuild.
    # ------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # SPA fallback: serve index.html for any route that does not match
    # a physical file so Angular Router can resolve it client-side.
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
