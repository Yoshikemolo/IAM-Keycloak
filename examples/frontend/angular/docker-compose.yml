# ---------------------------------------------------------------------------
# Docker Compose configuration for the IAM Angular Example.
#
# Services:
#   app - The Angular SPA served by Nginx, connecting to the platform
#         Keycloak instance running on the devops_iam-network.
#
# Usage:
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  # ---------- Angular SPA ----------
  app:
    build:
      context: .
      args:
        NG_CONFIG: development
    container_name: iam-angular-app
    ports:
      - "4200:80"
    networks:
      - iam-network

networks:
  iam-network:
    external: true
    name: devops_iam-network
