# =========================================================================
# values-qa.yaml -- QA / Staging environment overrides
# =========================================================================
# Usage:
#   helm upgrade --install xiam-kc ./infra/helm/keycloak \
#     -f ./infra/helm/keycloak/values.yaml \
#     -f ./infra/helm/keycloak/values-qa.yaml \
#     -n xiam-qa
#
# Characteristics:
#   - 2 replicas with moderate HPA
#   - Medium resource allocation
#   - INFO logging
#   - Production-like probe settings
#   - Network policies enabled
# =========================================================================

replicaCount: 2

# -------------------------------------------------------------------------
# Keycloak overrides
# -------------------------------------------------------------------------
keycloak:
  hostname: "iam-qa.xiam.example.com"
  hostnameStrict: "true"
  logLevel: "INFO"
  logFormat: "json"
  optimized: true

  database:
    vendor: "oracle"
    url: "jdbc:oracle:thin:@//oracle-qa:1521/keycloakdb"
    username: "keycloak_qa"
    existingSecret: "xiam-keycloak-db-qa"

  admin:
    existingSecret: "xiam-keycloak-admin-qa"

# -------------------------------------------------------------------------
# Resources -- medium
# -------------------------------------------------------------------------
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# -------------------------------------------------------------------------
# Autoscaling
# -------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80
  scaleUpStabilization: 120
  scaleDownStabilization: 300

# -------------------------------------------------------------------------
# PDB
# -------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -------------------------------------------------------------------------
# Ingress
# -------------------------------------------------------------------------
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "KC_ROUTE"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "600"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: iam-qa.xiam.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - iam-qa.xiam.example.com
      secretName: xiam-keycloak-qa-tls

# -------------------------------------------------------------------------
# Network policy
# -------------------------------------------------------------------------
networkPolicy:
  enabled: true
  ingressControllerNamespace: "ingress-nginx"
  monitoringNamespace: "monitoring"

# -------------------------------------------------------------------------
# Metrics
# -------------------------------------------------------------------------
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

# -------------------------------------------------------------------------
# ServiceAccount
# -------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: "keycloak-qa@xiam-project.iam.gserviceaccount.com"
