{{/*
==========================================================================
networkpolicy.yaml -- Network policies for Keycloak pods
==========================================================================
Applies a default-deny ingress posture and then explicitly allows:
  1. HTTP traffic from the Ingress controller on port 8080
  2. Management / metrics traffic from the monitoring namespace on 9000
  3. JGroups cluster communication between Keycloak pods on 7800
Egress is left open by default so that Keycloak can reach the database,
LDAP directories, and federated identity providers.
*/}}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "xiam-keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xiam-keycloak.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "xiam-keycloak.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # -- Allow HTTP traffic from the Ingress controller
    - from:
        {{- if .Values.networkPolicy.ingressControllerNamespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - port: 8080
          protocol: TCP

    # -- Allow management / metrics traffic from monitoring namespace
    - from:
        {{- if .Values.networkPolicy.monitoringNamespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - port: 9000
          protocol: TCP

    # -- Allow JGroups cluster traffic between Keycloak pods
    - from:
        - podSelector:
            matchLabels:
              {{- include "xiam-keycloak.selectorLabels" . | nindent 14 }}
      ports:
        - port: 7800
          protocol: TCP
{{- end }}
