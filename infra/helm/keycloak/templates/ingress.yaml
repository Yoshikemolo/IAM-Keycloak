{{/*
==========================================================================
ingress.yaml -- Ingress resource for external access to Keycloak
==========================================================================
Supports NGINX Ingress Controller and cert-manager for automatic TLS
certificate provisioning.  Annotations can be extended via
.Values.ingress.annotations for cloud-specific load balancers (e.g.,
GKE BackendConfig, GCP managed certificates).
*/}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "xiam-keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xiam-keycloak.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "xiam-keycloak.fullname" $ }}
                port:
                  number: {{ $.Values.service.port | default 8080 }}
          {{- end }}
    {{- end }}
{{- end }}
