{{/*
==========================================================================
serviceaccount.yaml -- Kubernetes ServiceAccount for Keycloak pods
==========================================================================
Supports GKE Workload Identity via the
iam.gke.io/gcp-service-account annotation so that Keycloak pods can
authenticate to Google Cloud services (e.g., Cloud SQL, Secret Manager)
without embedding long-lived credentials.
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "xiam-keycloak.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xiam-keycloak.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default true }}
{{- end }}
