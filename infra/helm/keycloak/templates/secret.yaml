{{/*
==========================================================================
secret.yaml -- Sensitive credentials for Keycloak
==========================================================================
Two secrets are managed here:
  1. Database credentials  (password for KC_DB_PASSWORD)
  2. Admin credentials     (KEYCLOAK_ADMIN / KEYCLOAK_ADMIN_PASSWORD)

If .Values.keycloak.database.existingSecret or
.Values.keycloak.admin.existingSecret are set, the corresponding secret
is NOT created -- the chart references the pre-existing one instead.

IMPORTANT: In production, manage secrets through an external secrets
operator (e.g., External Secrets, Sealed Secrets, or GCP Secret Manager)
rather than committing base64-encoded values in values files.
*/}}

{{/* ----- Database credential secret ----- */}}
{{- if not .Values.keycloak.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "xiam-keycloak.dbSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xiam-keycloak.labels" . | nindent 4 }}
type: Opaque
data:
  KC_DB_PASSWORD: {{ .Values.keycloak.database.password | default "" | b64enc | quote }}
---
{{- end }}

{{/* ----- Admin credential secret ----- */}}
{{- if not .Values.keycloak.admin.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "xiam-keycloak.adminSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xiam-keycloak.labels" . | nindent 4 }}
type: Opaque
data:
  KEYCLOAK_ADMIN: {{ .Values.keycloak.admin.username | default "admin" | b64enc | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.keycloak.admin.password | default "changeme" | b64enc | quote }}
{{- end }}
