###############################################################################
# parsers.conf
# Fluent Bit parser definitions for the IAM platform.
#
# Defines parsers for:
#   - Docker container log format (CRI and Docker JSON)
#   - Keycloak JSON structured log output
#   - Keycloak legacy plain-text log format
#   - Generic syslog format
###############################################################################

# ---------------------------------------------------------------------------
# Docker / CRI container log format
# Standard log line format used by Docker and containerd runtimes.
# ---------------------------------------------------------------------------
[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        cri
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# ---------------------------------------------------------------------------
# Keycloak JSON log format
# Keycloak 26 with KC_LOG_CONSOLE_OUTPUT=json produces structured JSON logs.
# Fields: timestamp, level, loggerName, message, mdc (mapped diagnostic context)
# ---------------------------------------------------------------------------
[PARSER]
    Name        keycloak_json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On
    # Decode nested fields
    Decode_Field_As json mdc

# ---------------------------------------------------------------------------
# Keycloak plain-text log format (fallback)
# Matches the default Quarkus/JBoss log pattern when JSON output is disabled.
# Example: 2026-03-07 12:00:00,000 INFO  [org.keycloak.events] (executor-thread-1) ...
# ---------------------------------------------------------------------------
[PARSER]
    Name        keycloak_plain
    Format      regex
    Regex       ^(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3})\s+(?<level>\w+)\s+\[(?<logger>[^\]]+)\]\s+\((?<thread>[^)]+)\)\s+(?<message>.*)$
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S,%L
    Time_Keep   On

# ---------------------------------------------------------------------------
# Generic syslog format
# Used for system-level logs from node-exporter or OS services.
# ---------------------------------------------------------------------------
[PARSER]
    Name        syslog
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On
