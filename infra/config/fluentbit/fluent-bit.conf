###############################################################################
# fluent-bit.conf
# Fluent Bit configuration for the IAM platform on GKE.
#
# Collects container logs from Kubernetes pods, parses JSON and Keycloak
# log formats, enriches with Kubernetes metadata, and forwards to Loki
# for centralized log aggregation.
#
# Pipeline:
#   Input (tail) -> Parser (JSON/KC) -> Filter (kubernetes) -> Output (Loki)
###############################################################################

# ---------------------------------------------------------------------------
# Service -- global Fluent Bit settings
# ---------------------------------------------------------------------------
[SERVICE]
    # Flush interval in seconds
    Flush           5

    # Log level for Fluent Bit internal logs
    Log_Level       info

    # Run as a daemon (false for containers)
    Daemon          Off

    # Path to parsers configuration
    Parsers_File    parsers.conf

    # Enable HTTP server for health checks and metrics
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020

    # Storage configuration for backpressure handling
    storage.path              /var/log/flb-storage/
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 5M

# ---------------------------------------------------------------------------
# Input -- tail Kubernetes container logs
# ---------------------------------------------------------------------------
[INPUT]
    Name              tail
    Tag               kube.*
    Path              /var/log/containers/*_iam_*.log
    Parser            docker
    DB                /var/log/flb-storage/kube-iam.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  10
    Read_from_Head    False

# Additional input for Keycloak-specific logs
[INPUT]
    Name              tail
    Tag               kc.*
    Path              /var/log/containers/iam-keycloak*.log
    Parser            docker
    DB                /var/log/flb-storage/kc.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  5
    Read_from_Head    False

# ---------------------------------------------------------------------------
# Filter -- Kubernetes metadata enrichment
# ---------------------------------------------------------------------------
[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     kube.var.log.containers.
    Merge_Log           On
    Merge_Log_Key       log_processed
    Keep_Log            Off
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off
    Labels              On
    Annotations         Off

[FILTER]
    Name                kubernetes
    Match               kc.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     kc.var.log.containers.
    Merge_Log           On
    Merge_Log_Key       log_processed
    Keep_Log            Off
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off
    Labels              On
    Annotations         Off

# ---------------------------------------------------------------------------
# Filter -- parse Keycloak JSON log output
# ---------------------------------------------------------------------------
[FILTER]
    Name          parser
    Match         kc.*
    Key_Name      log
    Parser        keycloak_json
    Reserve_Data  On
    Preserve_Key  Off

# ---------------------------------------------------------------------------
# Filter -- add static labels for Loki
# ---------------------------------------------------------------------------
[FILTER]
    Name          modify
    Match         *
    Add           cluster iam-gke
    Add           environment ${FLUENT_ENV:dev}

# ---------------------------------------------------------------------------
# Output -- forward to Loki
# ---------------------------------------------------------------------------
[OUTPUT]
    Name          loki
    Match         *
    Host          ${LOKI_HOST:loki}
    Port          ${LOKI_PORT:3100}
    Labels        job=fluentbit, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name'], container=$kubernetes['container_name']
    Auto_Kubernetes_Labels  On
    Tenant_ID     iam
    Retry_Limit   5
    tls           Off

# ---------------------------------------------------------------------------
# Output -- stdout for debugging (disable in production)
# ---------------------------------------------------------------------------
# [OUTPUT]
#     Name          stdout
#     Match         *
#     Format        json_lines
