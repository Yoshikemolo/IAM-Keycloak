# -----------------------------------------------------------------------------
# StorageClass: pd-ssd-encrypted
# Purpose: Defines a GKE StorageClass backed by SSD persistent disks with
#          customer-managed encryption key (CMEK) support. Used for any
#          persistent volumes needed by the IAM platform (e.g., database
#          storage, backup volumes).
#
# Key features:
#   - SSD-backed for low-latency I/O.
#   - Volume expansion enabled for online resizing.
#   - Retain reclaim policy to prevent accidental data loss.
#   - WaitForFirstConsumer binding for topology-aware scheduling.
#   - Disk encryption via GCP disk encryption key (CMEK).
# -----------------------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: pd-ssd-encrypted
  labels:
    app.kubernetes.io/name: storage-class
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: iam-platform
    app.kubernetes.io/managed-by: kustomize
provisioner: pd.csi.storage.gke.io
parameters:
  type: pd-ssd
  # Enable disk encryption with a customer-managed encryption key.
  # Replace with the actual KMS key resource name for your project.
  # Format: projects/PROJECT_ID/locations/LOCATION/keyRings/KEY_RING/cryptoKeys/KEY
  disk-encryption-kms-key: ""
  # File system type for the volume.
  csi.storage.k8s.io/fstype: ext4
# Retain volumes when PVCs are deleted to prevent data loss.
reclaimPolicy: Retain
# Wait for a pod to be scheduled before provisioning the volume.
# This ensures the volume is created in the same zone as the pod.
volumeBindingMode: WaitForFirstConsumer
# Allow online volume expansion without recreating the PVC.
allowVolumeExpansion: true
