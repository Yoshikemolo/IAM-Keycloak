# -----------------------------------------------------------------------------
# Ingress: keycloak
# Purpose: Exposes Keycloak to external traffic via an NGINX Ingress Controller.
#          Includes TLS termination via cert-manager, rate limiting to protect
#          against brute-force attacks, proxy buffer tuning for large SAML/OIDC
#          payloads, CORS headers, and security response headers.
#
# The hostname is set to a placeholder and should be patched per environment.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: iam-system
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: keycloak-iam
    app.kubernetes.io/version: "26.4.2"
    app.kubernetes.io/component: identity-provider
    app.kubernetes.io/part-of: iam-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # -- TLS / cert-manager --
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Force HTTPS redirect for all HTTP requests.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # -- Rate limiting --
    # Limit login and token endpoints to mitigate brute-force and credential
    # stuffing attacks. Values are requests per second (RPS).
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # -- Proxy buffer tuning --
    # Keycloak responses (especially SAML assertions) can be large.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # -- Timeouts --
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # -- Security headers --
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";

    # -- CORS --
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    # cors-allow-origin should be patched per environment.
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://iam.example.com"

    # -- Session affinity --
    # Sticky sessions help during admin console usage, though Keycloak is
    # designed for stateless operation with distributed caches.
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: KC_ROUTE
    nginx.ingress.kubernetes.io/session-cookie-secure: "true"
    nginx.ingress.kubernetes.io/session-cookie-samesite: Strict
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - iam.example.com
      secretName: keycloak-tls
  rules:
    - host: iam.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  name: http
