# -----------------------------------------------------------------------------
# Kustomization: keycloak (base)
# Purpose: Aggregates all Keycloak-specific resources for inclusion in the
#          top-level base kustomization.
# -----------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - configmap.yaml
  - hpa.yaml
  - pdb.yaml
  - service-account.yaml
