# -----------------------------------------------------------------------------
# ServiceAccount: keycloak
# Purpose: Dedicated service account for Keycloak pods. Used for:
#   1. RBAC -- grants minimal permissions to read ConfigMaps and list pods
#      for JGroups KUBE_PING cluster discovery.
#   2. GKE Workload Identity -- the annotation maps this KSA to a Google
#      Cloud IAM service account, enabling secure access to GCP services
#      (e.g., Cloud SQL, Secret Manager) without storing credentials.
#
# The Workload Identity annotation value should be patched per environment
# to point to the correct GCP project and IAM service account.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak
  namespace: iam-system
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: keycloak-iam
    app.kubernetes.io/version: "26.4.2"
    app.kubernetes.io/component: identity-provider
    app.kubernetes.io/part-of: iam-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # GKE Workload Identity: maps this Kubernetes SA to a GCP IAM SA.
    # Replace with the actual GCP project ID and IAM service account.
    iam.gke.io/gcp-service-account: keycloak@PROJECT_ID.iam.gserviceaccount.com
