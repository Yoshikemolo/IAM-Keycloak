# -----------------------------------------------------------------------------
# Patch: keycloak-resources (dev)
# Purpose: Sets minimal resource requests and limits for the development
#          environment to reduce infrastructure costs.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: iam-system
spec:
  template:
    spec:
      containers:
        - name: keycloak
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
