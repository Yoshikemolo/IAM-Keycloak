# -----------------------------------------------------------------------------
# Patch: keycloak-env (dev)
# Purpose: Adds development-specific environment variables to the Keycloak
#          container. Sets DEBUG log level for detailed troubleshooting and
#          disables strict hostname checking for local development.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: iam-system
spec:
  template:
    spec:
      containers:
        - name: keycloak
          env:
            - name: KC_LOG_LEVEL
              value: DEBUG
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
