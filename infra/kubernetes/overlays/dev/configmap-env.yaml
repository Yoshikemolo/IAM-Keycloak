# -----------------------------------------------------------------------------
# ConfigMap: keycloak-config (dev override)
# Purpose: Development-specific configuration values for Keycloak. Overrides
#          the base ConfigMap with relaxed settings suitable for local
#          development and testing.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: iam-system
data:
  # -- Database --
  KC_DB: postgres
  KC_DB_URL_HOST: keycloak-db.iam-system.svc.cluster.local
  KC_DB_URL_PORT: "5432"
  KC_DB_URL_DATABASE: keycloak_dev
  KC_DB_SCHEMA: public

  # -- Hostname --
  KC_HOSTNAME: iam-dev.example.com
  KC_HOSTNAME_STRICT: "false"
  KC_HOSTNAME_STRICT_HTTPS: "false"

  # -- HTTP --
  KC_HTTP_ENABLED: "true"
  KC_HTTP_PORT: "8080"
  KC_PROXY_HEADERS: xforwarded

  # -- Health and metrics --
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"
  KC_HTTP_MANAGEMENT_PORT: "9000"

  # -- Cache --
  KC_CACHE: ispn
  KC_CACHE_STACK: kubernetes
  JAVA_OPTS_APPEND: >-
    -Djgroups.dns.query=keycloak-jgroups.iam-system.svc.cluster.local
    -Djgroups.kubernetes.namespace=iam-system
    -Djgroups.kubernetes.labels=app.kubernetes.io/name=keycloak

  # -- Logging (verbose for development) --
  KC_LOG_LEVEL: DEBUG
  KC_LOG_CONSOLE_OUTPUT: json

  # -- Features --
  KC_FEATURES: token-exchange,admin-fine-grained-authz

  # -- Transactions --
  KC_TRANSACTION_XA_ENABLED: "false"
