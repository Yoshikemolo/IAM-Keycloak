# =========================================================================
# keycloak.conf -- Keycloak server configuration
# =========================================================================
# This file is copied into /opt/keycloak/conf/ at image build time.
# Runtime environment variables (KC_*) override these defaults.
#
# Reference: https://www.keycloak.org/server/all-config
# =========================================================================

# -------------------------------------------------------------------------
# HTTP / HTTPS
# -------------------------------------------------------------------------
# HTTP is served behind a reverse proxy; TLS terminates at the ingress.
http-enabled=true
http-port=8080
http-relative-path=/

# Proxy header forwarding mode (xforwarded or forwarded)
proxy-headers=xforwarded

# -------------------------------------------------------------------------
# Hostname
# -------------------------------------------------------------------------
# Set via KC_HOSTNAME at runtime. These are safe defaults.
hostname-strict=false
hostname-strict-backchannel=false

# -------------------------------------------------------------------------
# Database
# -------------------------------------------------------------------------
# Vendor and JDBC URL are injected via environment variables:
#   KC_DB, KC_DB_URL, KC_DB_USERNAME, KC_DB_PASSWORD
# Disable XA transactions for Cloud SQL and connection poolers.
transaction-xa-enabled=false

# -------------------------------------------------------------------------
# Cache (Infinispan)
# -------------------------------------------------------------------------
# Use KUBE_PING for Kubernetes pod discovery.
cache=ispn
cache-stack=kubernetes

# -------------------------------------------------------------------------
# Health and Metrics
# -------------------------------------------------------------------------
# Exposed on the management port 9000.
health-enabled=true
metrics-enabled=true

# -------------------------------------------------------------------------
# Features
# -------------------------------------------------------------------------
features=token-exchange,admin-fine-grained-authz,declarative-user-profile

# -------------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------------
# Override at runtime via KC_LOG_LEVEL and KC_LOG_CONSOLE_OUTPUT.
log-level=info
log-console-output=json

# -------------------------------------------------------------------------
# SPI overrides
# -------------------------------------------------------------------------
# Enable the custom audit event listener by default.
spi-events-listener-ximplicity-audit-listener-enabled=true
