# =========================================================================
# quarkus.properties -- Quarkus runtime tuning for Keycloak
# =========================================================================
# Placed in /opt/keycloak/conf/ alongside keycloak.conf.
# These properties tune the underlying Quarkus runtime that powers
# Keycloak 26+.  Only override what is necessary; Keycloak provides
# sensible defaults for most settings.
#
# Reference: https://www.keycloak.org/server/configuration
# =========================================================================

# -------------------------------------------------------------------------
# HTTP thread pool
# -------------------------------------------------------------------------
# Max worker threads for HTTP request handling.
# Default is max(200, 8 * CPU cores). Tune based on pod CPU limits.
quarkus.http.io-threads=4
quarkus.http.worker-threads=50

# -------------------------------------------------------------------------
# Datasource pool
# -------------------------------------------------------------------------
# Connection pool size.  Align with the database connection limit
# divided by the expected number of pods.
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.acquisition-timeout=5S
quarkus.datasource.jdbc.idle-removal-interval=PT2M

# -------------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------------
# Category-level overrides for noisy internal loggers.
quarkus.log.category."org.infinispan".level=WARN
quarkus.log.category."org.jgroups".level=WARN
quarkus.log.category."io.quarkus".level=INFO
quarkus.log.category."org.keycloak.events".level=DEBUG

# -------------------------------------------------------------------------
# Metrics
# -------------------------------------------------------------------------
# Expose micrometer metrics on the management port (9000).
quarkus.management.enabled=true
quarkus.management.port=9000
